name: "AI Agent — CI"

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rasp_ai_agent/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rasp_ai_agent/backend/requirements.txt

      - name: Install lint tools
        run: |
          pip install black isort flake8 mypy --quiet

      - name: Check formatting (black)
        run: black --check --diff app/ tests/

      - name: Check import order (isort)
        run: isort --check-only --diff app/ tests/

      - name: Lint (flake8)
        run: |
          flake8 app/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__,.venv,migrations \
            --statistics

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: "Unit Tests"
    runs-on: ubuntu-22.04
    needs: lint
    defaults:
      run:
        working-directory: rasp_ai_agent/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rasp_ai_agent/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install pytest pytest-asyncio \
                      pytest-httpx pytest-cov --quiet

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml
        env:
          TESTING: "true"
          DATABASE_PATH: ":memory:"
          OLLAMA_BASE_URL: "http://localhost:11434"
          OLLAMA_MODEL: "qwen2.5:3b"
          API_KEY_HEADER: "X-API-Key"
          LOG_LEVEL: "ERROR"
          APP_ENV: "testing"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: rasp_ai_agent/backend/coverage.xml
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: rasp_ai_agent/backend/test-results.xml
          retention-days: 14

  docker-build:
    name: "Docker Build Verification"
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: rasp_ai_agent/backend
          dockerfile: rasp_ai_agent/Dockerfile
          target: runtime
          push: false
          tags: rasp-ai-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d \
            --name ci_smoke_test \
            --memory=512m \
            -p 127.0.0.1:8001:8001 \
            -e DATABASE_PATH=:memory: \
            -e OLLAMA_BASE_URL=http://localhost:11434 \
            -e OLLAMA_MODEL=qwen2.5:3b \
            -e API_KEY_HEADER=X-API-Key \
            -e LOG_LEVEL=ERROR \
            -e APP_ENV=testing \
            rasp-ai-backend:ci-${{ github.sha }}

          echo "Waiting 20s for startup..."
          sleep 20

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                 --max-time 10 \
                 http://127.0.0.1:8001/api/v1/security/health \
                 2>/dev/null || echo "000")

          docker stop ci_smoke_test
          docker rm ci_smoke_test

          if [ "$HTTP" = "200" ]; then
            echo "Smoke test passed (HTTP $HTTP)"
          else
            echo "Smoke test FAILED (HTTP $HTTP)"
            exit 1
          fi
