name: "AI Agent — CD"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/rasp-ai-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Image security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/rasp-ai-backend:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
        continue-on-error: true

  deploy:
    name: "Deploy to Server"
    runs-on: ubuntu-22.04
    needs: build-and-push
    environment:
      name: production
      url: http://127.0.0.1:8001/api/v1/security/health
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            echo "=== Deployment started: $(date) ==="
            echo "Commit: ${{ github.sha }}"

            cd ~/rasp_ai_agent

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/rasp-ai-backend:latest

            # Update compose to use pulled image
            export IMAGE_TAG=latest

            # Zero-downtime update
            docker compose up -d \
              --no-deps \
              --pull always \
              rasp-ai-backend

            # Health check with retry
            echo "Verifying deployment health..."
            HEALTHY=false
            for i in $(seq 1 15); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                     --max-time 8 \
                     http://127.0.0.1:8001/api/v1/security/health \
                     2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "Deployment healthy (attempt $i)"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/15 — HTTP $HTTP — waiting 5s..."
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "=== DEPLOYMENT FAILED ==="
              docker compose logs rasp-ai-backend --tail=100
              exit 1
            fi

            # Cleanup old images
            docker image prune -f --filter "until=24h"
            echo "=== Deployment complete: $(date) ==="

  notify-failure:
    name: "Alert on Failure"
    runs-on: ubuntu-22.04
    needs: [build-and-push, deploy]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "=============================="
          echo " DEPLOYMENT FAILED"
          echo " Time   : $(date -u)"
          echo " Commit : ${{ github.sha }}"
          echo " Branch : ${{ github.ref_name }}"
          echo " Actor  : ${{ github.actor }}"
          echo " Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=============================="
